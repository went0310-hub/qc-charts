<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品管圖形工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
  :root {
    --deep-navy:#0d1b2a; --panel:#162032; --panel-border:#1e3150;
    --accent-cyan:#00bcd4; --text-primary:#e8f0fe; --text-secondary:#8faabe;
    --text-muted:#4a6080; --input-bg:#0d1b2a; --input-border:#1e3a5f;
    --input-focus:#1565C0; --shadow:0 4px 24px rgba(0,0,0,0.5);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans TC',sans-serif;background:var(--deep-navy);color:var(--text-primary);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 10%,rgba(21,101,192,.12) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 90%,rgba(27,94,32,.08) 0%,transparent 50%);}
  header{background:linear-gradient(135deg,#0d1b2a 0%,#162032 100%);border-bottom:1px solid var(--panel-border);
    padding:20px 40px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
  .header-icon{width:40px;height:40px;background:linear-gradient(135deg,#1565C0,#00bcd4);border-radius:10px;
    display:flex;align-items:center;justify-content:center;font-size:20px;}
  header h1{font-weight:900;font-size:22px;letter-spacing:3px;
    background:linear-gradient(90deg,#e8f0fe,#00bcd4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  header span{color:var(--text-muted);font-size:13px;font-weight:300;letter-spacing:2px;margin-left:8px;padding-top:3px;}
  .main-container{max-width:1500px;margin:0 auto;padding:30px 24px;}
  .tab-nav{display:flex;gap:4px;background:var(--panel);padding:6px;border-radius:14px;
    border:1px solid var(--panel-border);margin-bottom:28px;}
  .tab-btn{flex:1;padding:12px 16px;border:none;background:transparent;color:var(--text-secondary);
    font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:10px;
    transition:all .25s;letter-spacing:1px;}
  .tab-btn:hover{background:rgba(21,101,192,.15);color:var(--text-primary);}
  .tab-btn.active{background:linear-gradient(135deg,#1565C0,#0d47a1);color:#fff;box-shadow:0 2px 12px rgba(21,101,192,.4);}
  .tab-content{display:none;}.tab-content.active{display:block;}
  .chart-layout{display:grid;grid-template-columns:380px 1fr;gap:24px;align-items:start;}
  .panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:16px;padding:20px;box-shadow:var(--shadow);}
  .panel-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent-cyan);text-transform:uppercase;
    margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .panel-title::before{content:'';display:inline-block;width:3px;height:16px;background:var(--accent-cyan);border-radius:2px;}
  .form-group{margin-bottom:12px;}
  label{display:block;font-size:11px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;letter-spacing:.5px;}
  input[type="text"],input[type="number"],select{width:100%;background:var(--input-bg);border:1px solid var(--input-border);
    color:var(--text-primary);padding:7px 10px;border-radius:7px;font-family:'Noto Sans TC',sans-serif;font-size:12px;
    outline:none;transition:border-color .2s,box-shadow .2s;}
  input[type="color"]{width:100%;height:32px;background:var(--input-bg);border:1px solid var(--input-border);
    border-radius:7px;cursor:pointer;padding:2px 4px;}
  input:focus,select:focus{border-color:var(--input-focus);box-shadow:0 0 0 3px rgba(21,101,192,.15);}
  select option{background:#162032;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
  .row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;}
  .divider{height:1px;background:var(--panel-border);margin:12px 0;}
  .section-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;
    letter-spacing:2px;margin-bottom:8px;margin-top:4px;}
  .color-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;}
  .chart-title-input{width:100%;background:rgba(21,101,192,.08);border:1px solid rgba(21,101,192,.3);
    color:var(--text-primary);padding:9px 12px;border-radius:8px;font-family:'Noto Sans TC',sans-serif;
    font-size:14px;font-weight:500;outline:none;margin-bottom:12px;transition:border-color .2s;}
  .chart-title-input:focus{border-color:var(--accent-cyan);}
  .gen-btn{width:100%;padding:12px;background:linear-gradient(135deg,#1565C0,#0d47a1);border:none;border-radius:10px;
    color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;cursor:pointer;
    margin-top:8px;transition:all .2s;box-shadow:0 4px 16px rgba(21,101,192,.3);}
  .gen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(21,101,192,.45);}
  .dl-btn{width:100%;padding:9px;background:transparent;border:1px solid var(--panel-border);border-radius:8px;
    color:var(--text-secondary);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;
    margin-top:6px;transition:all .2s;letter-spacing:1px;}
  .dl-btn:hover{border-color:var(--accent-cyan);color:var(--accent-cyan);}
  .chart-wrapper{background:#fff;border:1px solid var(--panel-border);border-radius:16px;padding:28px;
    box-shadow:var(--shadow);position:relative;min-height:460px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;}
  .chart-placeholder{text-align:center;color:#aaa;}
  .chart-placeholder .big-icon{font-size:48px;margin-bottom:12px;}
  .chart-placeholder p{font-size:14px;letter-spacing:1px;}
  canvas{max-width:100%;}
  .chart-display-title{font-size:18px;font-weight:700;color:#000;text-align:center;margin-bottom:16px;
    letter-spacing:1px;width:100%;}
  /* scroll panel */
  .scroll-panel{max-height:420px;overflow-y:auto;padding-right:4px;}
  .scroll-panel::-webkit-scrollbar{width:4px;}
  .scroll-panel::-webkit-scrollbar-track{background:transparent;}
  .scroll-panel::-webkit-scrollbar-thumb{background:var(--panel-border);border-radius:2px;}
  /* data rows */
  .data-row{display:grid;gap:5px;align-items:center;margin-bottom:5px;background:rgba(255,255,255,.03);
    border-radius:6px;padding:6px;}
  .trend-data-row{grid-template-columns:1fr 90px 28px;}
  .radar-data-row{grid-template-columns:1fr 70px 70px 28px;}
  .del-btn{background:rgba(183,28,28,.15);border:1px solid rgba(183,28,28,.3);color:#ef9a9a;
    border-radius:5px;cursor:pointer;font-size:13px;padding:3px 0;width:100%;transition:all .2s;}
  .del-btn:hover{background:rgba(183,28,28,.35);}
  .add-row-btn{width:100%;padding:7px;background:transparent;border:1px dashed var(--input-border);
    color:var(--text-secondary);border-radius:6px;cursor:pointer;font-size:12px;
    font-family:'Noto Sans TC',sans-serif;transition:all .2s;margin-top:4px;}
  .add-row-btn:hover{border-color:var(--accent-cyan);color:var(--accent-cyan);}
  .style-section{background:rgba(0,188,212,.05);border:1px solid rgba(0,188,212,.15);
    border-radius:10px;padding:12px;margin-top:10px;}
  .style-section-title{font-size:10px;font-weight:700;color:var(--accent-cyan);letter-spacing:2px;
    text-transform:uppercase;margin-bottom:10px;}
  @media(max-width:900px){.chart-layout{grid-template-columns:1fr;}header{padding:16px 20px;}
    header h1{font-size:16px;}header span{display:none;}}
</style>
</head>
<body>
<header>
  <div class="header-icon">📊</div>
  <h1>品管圖形工具</h1>
  <span>QUALITY CONTROL CHARTS</span>
</header>
<div class="main-container">
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('tab1')">📊 目標設定<br><small>直條圖</small></button>
    <button class="tab-btn" onclick="switchTab('tab2')">🔧 對策實施<br><small>直條圖</small></button>
    <button class="tab-btn" onclick="switchTab('tab3')">✅ 效果確認<br><small>直條圖</small></button>
    <button class="tab-btn" onclick="switchTab('tab4')">📈 推移圖<br><small>折線圖</small></button>
    <button class="tab-btn" onclick="switchTab('tab5')">🕸️ 雷達圖</button>
  </div>

  <!-- ===== TAB 1 ===== -->
  <div id="tab1" class="tab-content active">
    <div class="chart-layout">
      <div class="panel">
        <div class="panel-title">目標設定 · 資料輸入</div>
        <div class="scroll-panel">
          <div class="form-group"><label>圖表標題</label>
            <input class="chart-title-input" id="t1_title" type="text" value="不良率改善目標"></div>

          <div class="section-label"><span class="color-dot" style="background:#1565C0"></span>改善前</div>
          <div class="form-group"><label>日期區間（X軸顯示）</label>
            <input type="text" id="t1_before_date" placeholder="例：10/17-10/30" value="10/17-10/30"></div>
          <div class="form-group"><label>數值</label>
            <input type="number" id="t1_before_val" value="8.5" step="any"></div>

          <div class="divider"></div>
          <div class="section-label"><span class="color-dot" style="background:#B71C1C"></span>目標值</div>
          <div class="form-group"><label>目標數值</label>
            <input type="number" id="t1_target_val" value="3.0" step="any"></div>

          <div class="divider"></div>
          <div class="row-2">
            <div class="form-group"><label>數值單位</label>
              <select id="t1_unit">
                <option value="percent">百分比 (%)</option>
                <option value="permille">千分比 (‰)</option>
                <option value="value">數值</option>
                <option value="time">時間</option>
              </select></div>
            <div class="form-group"><label>小數位數</label>
              <select id="t1_decimal">
                <option value="0">0</option><option value="1" selected>1</option>
                <option value="2">2</option><option value="3">3</option>
              </select></div>
          </div>
          <div class="row-2">
            <div class="form-group"><label>垂直軸標題</label>
              <input type="text" id="t1_yaxis_title" value="不良率"></div>
            <div class="form-group"><label>垂直軸最小值</label>
              <input type="number" id="t1_ymin" placeholder="自動" step="any"></div>
          </div>
          <div class="form-group"><label>垂直軸最大值</label>
            <input type="number" id="t1_ymax" placeholder="自動" step="any"></div>

          <!-- Style -->
          <div class="style-section">
            <div class="style-section-title">🎨 外觀設定</div>
            <div class="row-4">
              <div class="form-group"><label>標題大小</label>
                <input type="number" id="t1_fs_title" value="18" min="10" max="40"></div>
              <div class="form-group"><label>軸標題大小</label>
                <input type="number" id="t1_fs_axis_title" value="14" min="8" max="30"></div>
              <div class="form-group"><label>軸刻度大小</label>
                <input type="number" id="t1_fs_tick" value="12" min="8" max="24"></div>
              <div class="form-group"><label>數據標籤大小</label>
                <input type="number" id="t1_fs_label" value="16" min="8" max="32"></div>
            </div>
            <div class="row-3">
              <div class="form-group"><label>文字顏色</label>
                <input type="color" id="t1_text_color" value="#000000"></div>
              <div class="form-group"><label>改善前顏色</label>
                <input type="color" id="t1_col_before" value="#1565C0"></div>
              <div class="form-group"><label>目標值顏色</label>
                <input type="color" id="t1_col_target" value="#B71C1C"></div>
            </div>
          </div>
        </div>
        <button class="gen-btn" onclick="generateChart1()">▶ 生成圖表</button>
        <button class="dl-btn" onclick="downloadChart('chart1')">⬇ 下載 JPG</button>
      </div>
      <div class="chart-wrapper" id="wrap1">
        <div class="chart-placeholder" id="placeholder1"><div class="big-icon">📊</div><p>輸入資料後點擊「生成圖表」</p></div>
        <div id="chart1_title" class="chart-display-title" style="display:none"></div>
        <canvas id="chart1" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <!-- ===== TAB 2 ===== -->
  <div id="tab2" class="tab-content">
    <div class="chart-layout">
      <div class="panel">
        <div class="panel-title">對策實施 · 資料輸入</div>
        <div class="scroll-panel">
          <div class="form-group"><label>圖表標題</label>
            <input class="chart-title-input" id="t2_title" type="text" value="對策實施成效"></div>

          <div class="section-label"><span class="color-dot" style="background:#1565C0"></span>改善前</div>
          <div class="form-group"><label>日期區間（X軸顯示）</label>
            <input type="text" id="t2_before_date" placeholder="例：10/17-10/30" value="10/17-10/30"></div>
          <div class="form-group"><label>數值</label>
            <input type="number" id="t2_before_val" value="8.5" step="any"></div>

          <div class="divider"></div>
          <div class="section-label"><span class="color-dot" style="background:#2E7D32"></span>改善中</div>
          <div class="form-group"><label>日期區間（X軸顯示）</label>
            <input type="text" id="t2_during_date" placeholder="例：11/01-11/30" value="11/01-11/30"></div>
          <div class="form-group"><label>數值</label>
            <input type="number" id="t2_during_val" value="5.2" step="any"></div>

          <div class="divider"></div>
          <div class="row-2">
            <div class="form-group"><label>數值單位</label>
              <select id="t2_unit">
                <option value="percent">百分比 (%)</option><option value="permille">千分比 (‰)</option>
                <option value="value">數值</option><option value="time">時間</option>
              </select></div>
            <div class="form-group"><label>小數位數</label>
              <select id="t2_decimal">
                <option value="0">0</option><option value="1" selected>1</option>
                <option value="2">2</option><option value="3">3</option>
              </select></div>
          </div>
          <div class="row-2">
            <div class="form-group"><label>垂直軸標題</label>
              <input type="text" id="t2_yaxis_title" value="不良率"></div>
            <div class="form-group"><label>垂直軸最小值</label>
              <input type="number" id="t2_ymin" placeholder="自動" step="any"></div>
          </div>
          <div class="form-group"><label>垂直軸最大值</label>
            <input type="number" id="t2_ymax" placeholder="自動" step="any"></div>

          <div class="style-section">
            <div class="style-section-title">🎨 外觀設定</div>
            <div class="row-4">
              <div class="form-group"><label>標題大小</label>
                <input type="number" id="t2_fs_title" value="18" min="10" max="40"></div>
              <div class="form-group"><label>軸標題大小</label>
                <input type="number" id="t2_fs_axis_title" value="14" min="8" max="30"></div>
              <div class="form-group"><label>軸刻度大小</label>
                <input type="number" id="t2_fs_tick" value="12" min="8" max="24"></div>
              <div class="form-group"><label>數據標籤大小</label>
                <input type="number" id="t2_fs_label" value="16" min="8" max="32"></div>
            </div>
            <div class="row-3">
              <div class="form-group"><label>文字顏色</label>
                <input type="color" id="t2_text_color" value="#000000"></div>
              <div class="form-group"><label>改善前顏色</label>
                <input type="color" id="t2_col_before" value="#1565C0"></div>
              <div class="form-group"><label>改善中顏色</label>
                <input type="color" id="t2_col_during" value="#2E7D32"></div>
            </div>
          </div>
        </div>
        <button class="gen-btn" onclick="generateChart2()">▶ 生成圖表</button>
        <button class="dl-btn" onclick="downloadChart('chart2')">⬇ 下載 JPG</button>
      </div>
      <div class="chart-wrapper" id="wrap2">
        <div class="chart-placeholder" id="placeholder2"><div class="big-icon">🔧</div><p>輸入資料後點擊「生成圖表」</p></div>
        <div id="chart2_title" class="chart-display-title" style="display:none"></div>
        <canvas id="chart2" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <!-- ===== TAB 3 ===== -->
  <div id="tab3" class="tab-content">
    <div class="chart-layout">
      <div class="panel">
        <div class="panel-title">效果確認 · 資料輸入</div>
        <div class="scroll-panel">
          <div class="form-group"><label>圖表標題</label>
            <input class="chart-title-input" id="t3_title" type="text" value="改善效果確認"></div>

          <div class="section-label"><span class="color-dot" style="background:#1565C0"></span>改善前</div>
          <div class="form-group"><label>日期區間（X軸顯示）</label>
            <input type="text" id="t3_before_date" placeholder="例：10/17-10/30" value="10/17-10/30"></div>
          <div class="form-group"><label>數值</label>
            <input type="number" id="t3_before_val" value="8.5" step="any"></div>

          <div class="divider"></div>
          <div class="section-label"><span class="color-dot" style="background:#B71C1C"></span>目標值</div>
          <div class="form-group"><label>目標數值</label>
            <input type="number" id="t3_target_val" value="3.0" step="any"></div>

          <div class="divider"></div>
          <div class="section-label"><span class="color-dot" style="background:#2E7D32"></span>改善後</div>
          <div class="form-group"><label>日期區間（X軸顯示）</label>
            <input type="text" id="t3_after_date" placeholder="例：12/01-12/31" value="12/01-12/31"></div>
          <div class="form-group"><label>數值</label>
            <input type="number" id="t3_after_val" value="2.1" step="any"></div>

          <div class="divider"></div>
          <div class="row-2">
            <div class="form-group"><label>數值單位</label>
              <select id="t3_unit">
                <option value="percent">百分比 (%)</option><option value="permille">千分比 (‰)</option>
                <option value="value">數值</option><option value="time">時間</option>
              </select></div>
            <div class="form-group"><label>小數位數</label>
              <select id="t3_decimal">
                <option value="0">0</option><option value="1" selected>1</option>
                <option value="2">2</option><option value="3">3</option>
              </select></div>
          </div>
          <div class="row-2">
            <div class="form-group"><label>垂直軸標題</label>
              <input type="text" id="t3_yaxis_title" value="不良率"></div>
            <div class="form-group"><label>垂直軸最小值</label>
              <input type="number" id="t3_ymin" placeholder="自動" step="any"></div>

          <div class="form-group"><label>垂直軸最大值</label>

          <div class="style-section">
            <div class="style-section-title">🎨 外觀設定</div>
            <div class="row-4">
              <div class="form-group"><label>標題大小</label>
                <input type="number" id="t3_fs_title" value="18" min="10" max="40"></div>
              <div class="form-group"><label>軸標題大小</label>
                <input type="number" id="t3_fs_axis_title" value="14" min="8" max="30"></div>
              <div class="form-group"><label>軸刻度大小</label>
                <input type="number" id="t3_fs_tick" value="12" min="8" max="24"></div>
              <div class="form-group"><label>數據標籤大小</label>
                <input type="number" id="t3_fs_label" value="16" min="8" max="32"></div>
            </div>
            <div class="row-4">
              <div class="form-group"><label>文字顏色</label>
                <input type="color" id="t3_text_color" value="#000000"></div>
              <div class="form-group"><label>改善前顏色</label>
                <input type="color" id="t3_col_before" value="#1565C0"></div>
              <div class="form-group"><label>目標值顏色</label>
                <input type="color" id="t3_col_target" value="#B71C1C"></div>
              <div class="form-group"><label>改善後顏色</label>
                <input type="color" id="t3_col_after" value="#2E7D32"></div>
            </div>
          </div>
        </div>
        <button class="gen-btn" onclick="generateChart3()">▶ 生成圖表</button>
        <button class="dl-btn" onclick="downloadChart('chart3')">⬇ 下載 JPG</button>
      </div>
      <div class="chart-wrapper" id="wrap3">
        <div class="chart-placeholder" id="placeholder3"><div class="big-icon">✅</div><p>輸入資料後點擊「生成圖表」</p></div>
        <div id="chart3_title" class="chart-display-title" style="display:none"></div>
        <canvas id="chart3" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <!-- ===== TAB 4 推移圖 ===== -->
  <div id="tab4" class="tab-content">
    <div class="chart-layout">
      <div class="panel">
        <div class="panel-title">推移圖 · 資料輸入</div>
        <div class="scroll-panel">
          <div class="form-group"><label>圖表標題</label>

<script>
// ===== GLOBALS =====
const chartInstances = {};
const GRID_MAIN = 'rgb(242,242,242)';
const GRID_NONE = 'rgba(0,0,0,0)';
Chart.defaults.font.family = "'Noto Sans TC', sans-serif";

// ===== TAB =====
function switchTab(id) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab-btn')[parseInt(id.replace('tab',''))-1].classList.add('active');
}

// ===== UNIT =====
function getUnitSuffix(unit) {
  if (unit==='percent') return '%';
  if (unit==='permille') return '‰';
  return '';
}
function formatVal(val, unit, decimal) {
  return parseFloat(val).toFixed(parseInt(decimal)) + getUnitSuffix(unit);
}

// ===== HELPERS =====
function destroyChart(id) { if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }
function showChart(id) {
  const n = id.replace('chart','');
  document.getElementById('placeholder'+n).style.display='none';
  document.getElementById(id+'_title').style.display='block';
  document.getElementById(id).style.display='block';
}
function gv(id) { return document.getElementById(id).value; }
function gn(id) { const v=parseFloat(gv(id)); return isNaN(v)?undefined:v; }
function gi(id) { const v=parseInt(gv(id)); return isNaN(v)?14:v; }
function getYBounds(minId, maxId) {
  const mn = gn(minId), mx = gn(maxId);
  return { min: mn, max: mx };
}
function hexToRgba(hex, alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ===== DATA LABELS PLUGIN =====
const dataLabelsPlugin = {
  id: 'customDataLabels',
  afterDatasetsDraw(chart) {
    if (chart.config.type==='radar'||chart.config.type==='line') return;
    const { ctx } = chart;
    const fsLabel = chart._qcFsLabel || 16;
    const textColor = chart._qcTextColor || '#000000';
    chart.data.datasets.forEach((dataset, i) => {
      chart.getDatasetMeta(i).data.forEach((bar, idx) => {
        const val = dataset.data[idx];
        if (val===null||val===undefined) return;
        ctx.save();
        ctx.font = `700 ${fsLabel}px 'Noto Sans TC', sans-serif`;
        ctx.fillStyle = textColor;
        ctx.textAlign = 'center';
        ctx.fillText(formatVal(val, chart._qcUnit||'value', chart._qcDecimal||'1'), bar.x, bar.y-10);
        ctx.restore();
      });
    });
  }
};
Chart.register(dataLabelsPlugin);

// ===== VERTICAL Y TITLE PLUGIN =====
const verticalYTitlePlugin = {
  id: 'verticalYTitle',
  afterDraw(chart) {
    const yAxis = chart.scales['y'];
    if (!yAxis) return;
    const text = chart._qcYTitle;
    if (!text) return;
    const { ctx } = chart;
    const fontSize = chart._qcFsAxisTitle || 14;
    const textColor = chart._qcTextColor || '#000000';
    ctx.save();
    ctx.font = `600 ${fontSize}px 'Noto Sans TC', sans-serif`;
    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    const x = yAxis.left - 26;
    const centerY = (yAxis.top + yAxis.bottom) / 2;
    const lineH = fontSize + 4;
    const chars = [...text];
    const totalH = chars.length * lineH;
    chars.forEach((ch, i) => {
      ctx.fillText(ch, x, centerY - totalH/2 + i*lineH + fontSize/2);
    });
    ctx.restore();
  }
};
Chart.register(verticalYTitlePlugin);

// ===== BAR CONFIG =====
function barConfig(labels, datasets, opts) {
  const { yTitle, unit, decimal, ymin, ymax, fsAxisTitle, fsTick, textColor } = opts;
  return {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => formatVal(ctx.raw, unit, decimal) } }
      },
      layout: { padding: { top: 36, right: 24, left: 48, bottom: 10 } },
      scales: {
        x: {
          ticks: { font: { size: fsTick }, color: textColor, maxRotation: 0 },
          title: { display: false },
          grid: { drawOnChartArea: false, drawTicks: true, color: GRID_NONE },
          border: { color: '#ccc' }
        },
        y: {
          min: ymin, max: ymax,
          ticks: { font: { size: fsTick }, color: textColor, callback: v => formatVal(v, unit, decimal) },
          title: { display: false, text: yTitle },
          grid: { color: ctx => ctx.tick.value===0 ? '#bbb' : GRID_MAIN, lineWidth: 1, drawTicks: false },
          border: { color: '#ccc', dash: [] }
        }
      }
    }
  };
}

function makeLabel(prefix, dateStr) {
  if (!dateStr) return prefix;
  return prefix + '\n' + dateStr;
}

function applyChartMeta(chart, opts) {
  chart._qcUnit = opts.unit;
  chart._qcDecimal = opts.decimal;
  chart._qcYTitle = opts.yTitle;
  chart._qcFsLabel = opts.fsLabel;
  chart._qcFsAxisTitle = opts.fsAxisTitle;
  chart._qcTextColor = opts.textColor;
}

// ===== CHART 1 =====
function generateChart1() {
  const beforeDate = gv('t1_before_date').trim();
  const beforeVal  = parseFloat(gv('t1_before_val'));
  const targetVal  = parseFloat(gv('t1_target_val'));
  const unit = gv('t1_unit'), decimal = gv('t1_decimal');
  const chartTitle = gv('t1_title') || '目標設定';
  const yTitle = gv('t1_yaxis_title');
  const colBefore = gv('t1_col_before'), colTarget = gv('t1_col_target');
  const textColor = gv('t1_text_color');
  const fsTitle = gi('t1_fs_title'), fsAxisTitle = gi('t1_fs_axis_title');
  const fsTick = gi('t1_fs_tick'), fsLabel = gi('t1_fs_label');
  const { min: ymin, max: ymax } = getYBounds('t1_ymin','t1_ymax');

  if (isNaN(beforeVal)||isNaN(targetVal)) { alert('請輸入有效數值'); return; }
  destroyChart('chart1'); showChart('chart1');

  const titleEl = document.getElementById('chart1_title');
  titleEl.textContent = chartTitle;
  titleEl.style.fontSize = fsTitle + 'px';
  titleEl.style.color = textColor;

  const labels = [makeLabel('改善前', beforeDate), '目標值'];
  const cfg = barConfig(labels, [{
    data: [beforeVal, targetVal],
    backgroundColor: [colBefore, colTarget],
    borderRadius: 4, borderSkipped: false, barPercentage: 0.45,
  }], { yTitle, unit, decimal, ymin, ymax, fsAxisTitle, fsTick, textColor });

  const chart = new Chart(document.getElementById('chart1').getContext('2d'), cfg);
  applyChartMeta(chart, { unit, decimal, yTitle, fsLabel, fsAxisTitle, textColor });
  chartInstances['chart1'] = chart;
}

// ===== CHART 2 =====
function generateChart2() {
  const beforeDate = gv('t2_before_date').trim(), duringDate = gv('t2_during_date').trim();
  const beforeVal = parseFloat(gv('t2_before_val')), duringVal = parseFloat(gv('t2_during_val'));
  const unit = gv('t2_unit'), decimal = gv('t2_decimal');
  const chartTitle = gv('t2_title') || '對策實施';
  const yTitle = gv('t2_yaxis_title');
  const colBefore = gv('t2_col_before'), colDuring = gv('t2_col_during');
  const textColor = gv('t2_text_color');
  const fsTitle = gi('t2_fs_title'), fsAxisTitle = gi('t2_fs_axis_title');
  const fsTick = gi('t2_fs_tick'), fsLabel = gi('t2_fs_label');
  const { min: ymin, max: ymax } = getYBounds('t2_ymin','t2_ymax');

  if (isNaN(beforeVal)||isNaN(duringVal)) { alert('請輸入有效數值'); return; }
  destroyChart('chart2'); showChart('chart2');

  const titleEl = document.getElementById('chart2_title');
  titleEl.textContent = chartTitle;
  titleEl.style.fontSize = fsTitle + 'px';
  titleEl.style.color = textColor;

  const labels = [makeLabel('改善前', beforeDate), makeLabel('改善中', duringDate)];
  const cfg = barConfig(labels, [{
    data: [beforeVal, duringVal],
    backgroundColor: [colBefore, colDuring],
    borderRadius: 4, borderSkipped: false, barPercentage: 0.45,
  }], { yTitle, unit, decimal, ymin, ymax, fsAxisTitle, fsTick, textColor });

  const chart = new Chart(document.getElementById('chart2').getContext('2d'), cfg);
  applyChartMeta(chart, { unit, decimal, yTitle, fsLabel, fsAxisTitle, textColor });
  chartInstances['chart2'] = chart;
}

// ===== CHART 3 =====
function generateChart3() {
  const beforeDate = gv('t3_before_date').trim(), afterDate = gv('t3_after_date').trim();
  const beforeVal = parseFloat(gv('t3_before_val')), targetVal = parseFloat(gv('t3_target_val')), afterVal = parseFloat(gv('t3_after_val'));
  const unit = gv('t3_unit'), decimal = gv('t3_decimal');
  const chartTitle = gv('t3_title') || '效果確認';
  const yTitle = gv('t3_yaxis_title');
  const colBefore = gv('t3_col_before'), colTarget = gv('t3_col_target'), colAfter = gv('t3_col_after');
  const textColor = gv('t3_text_color');
  const fsTitle = gi('t3_fs_title'), fsAxisTitle = gi('t3_fs_axis_title');
  const fsTick = gi('t3_fs_tick'), fsLabel = gi('t3_fs_label');
  const { min: ymin, max: ymax } = getYBounds('t3_ymin','t3_ymax');

  if (isNaN(beforeVal)||isNaN(targetVal)||isNaN(afterVal)) { alert('請輸入有效數值'); return; }
  destroyChart('chart3'); showChart('chart3');

  const titleEl = document.getElementById('chart3_title');
  titleEl.textContent = chartTitle;
  titleEl.style.fontSize = fsTitle + 'px';
  titleEl.style.color = textColor;

  const labels = [makeLabel('改善前', beforeDate), '目標值', makeLabel('改善後', afterDate)];
  const cfg = barConfig(labels, [{
    data: [beforeVal, targetVal, afterVal],
    backgroundColor: [colBefore, colTarget, colAfter],
    borderRadius: 4, borderSkipped: false, barPercentage: 0.45,
  }], { yTitle, unit, decimal, ymin, ymax, fsAxisTitle, fsTick, textColor });

  const chart = new Chart(document.getElementById('chart3').getContext('2d'), cfg);
  applyChartMeta(chart, { unit, decimal, yTitle, fsLabel, fsAxisTitle, textColor });
  chartInstances['chart3'] = chart;
}

// ===== TREND ROW =====
function addTrendRow(label='', val='') {
  const area = document.getElementById('trend_points');
  const row = document.createElement('div');
  row.className = 'data-row trend-data-row';
  row.innerHTML = `
    <input type="text" placeholder="例：2024/01" value="${label}" style="font-size:12px">
    <input type="number" placeholder="數值" value="${val}" step="any" style="font-size:12px">
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  area.appendChild(row);
}

// ===== CHART 4 =====
function generateChart4() {
  const rows = document.querySelectorAll('#trend_points .trend-data-row');
  const allLabels = [], allData = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const lbl = inputs[0].value.trim();
    const val = parseFloat(inputs[1].value);
    if (lbl) { allLabels.push(lbl); allData.push(isNaN(val) ? null : val); }
  });
  if (allLabels.length === 0) { alert('請至少輸入一個資料點'); return; }

  const unit = gv('t4_unit'), decimal = gv('t4_decimal');
  const chartTitle = gv('t4_title') || '推移圖';
  const yTitle = gv('t4_yaxis_title');
  const colLine = gv('t4_col_line'), colTarget = gv('t4_col_target');
  const textColor = gv('t4_text_color');
  const fsTitle = gi('t4_fs_title'), fsAxisTitle = gi('t4_fs_axis_title');
  const fsTick = gi('t4_fs_tick'), fsLabel = gi('t4_fs_label');
  const { min: ymin, max: ymax } = getYBounds('t4_ymin','t4_ymax');

  const targetRaw = gv('t4_target');
  const targetVal = targetRaw !== '' ? parseFloat(targetRaw) : null;
  const targetStartRaw = parseInt(gv('t4_target_start')) || 1;
  const targetStart = Math.max(1, Math.min(targetStartRaw, allLabels.length)) - 1;

  destroyChart('chart4'); showChart('chart4');

  const titleEl = document.getElementById('chart4_title');
  titleEl.textContent = chartTitle;
  titleEl.style.fontSize = fsTitle + 'px';
  titleEl.style.color = textColor;

  const datasets = [{
    label: '實績', data: allData,
    borderColor: colLine, backgroundColor: hexToRgba(colLine, 0.08),
    pointBackgroundColor: colLine, pointRadius: 6, pointHoverRadius: 8,
    fill: true, tension: 0.3, borderWidth: 2.5,
  }];

  if (targetVal !== null && !isNaN(targetVal)) {
    // Build target data: null before start index, then value
    const targetData = allLabels.map((_, i) => i >= targetStart ? targetVal : null);
    datasets.push({
      label: '目標線', data: targetData,
      borderColor: colTarget, borderDash: [8,4], borderWidth: 2,
      pointRadius: 0, fill: false, spanGaps: false,
    });
  }

  const chart = new Chart(document.getElementById('chart4').getContext('2d'), {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: {
          display: targetVal !== null && !isNaN(targetVal),
          labels: { color: textColor, font: { size: 13 } }
        },
        tooltip: { callbacks: { label: ctx => ctx.raw!==null ? formatVal(ctx.raw, unit, decimal) : '' } }
      },
      layout: { padding: { top: 20, right: 24, left: 48, bottom: 10 } },
      scales: {
        x: {
          ticks: { font: { size: fsTick }, color: textColor },
          grid: { drawOnChartArea: false, color: GRID_NONE },
          border: { color: '#ccc' }
        },
        y: {
          min: ymin, max: ymax,
          ticks: { font: { size: fsTick }, color: textColor, callback: v => formatVal(v, unit, decimal) },
          title: { display: false, text: yTitle },
          grid: { color: ctx => ctx.tick.value===0 ? '#bbb' : GRID_MAIN, lineWidth: 1, drawTicks: false },
          border: { color: '#ccc' }
        }
      }
    }
  });
  applyChartMeta(chart, { unit, decimal, yTitle, fsLabel, fsAxisTitle, textColor });
  chartInstances['chart4'] = chart;
}

// ===== RADAR ROW =====
function addRadarRow(name='', v1='', v2='') {
  const list = document.getElementById('radar_items');
  const row = document.createElement('div');
  row.className = 'data-row radar-data-row';
  row.innerHTML = `
    <input type="text" placeholder="項目名稱" value="${name}" style="font-size:12px">
    <input type="number" placeholder="系列1" value="${v1}" step="any" style="font-size:12px">
    <input type="number" placeholder="系列2" value="${v2}" step="any" style="font-size:12px">
    <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(row);
}

// ===== CHART 5 =====
function generateChart5() {
  const rows = document.querySelectorAll('#radar_items .radar-data-row');
  const labels = [], s1data = [], s2data = [];
  rows.forEach(r => {
    const inputs = r.querySelectorAll('input');
    const lbl = inputs[0].value.trim();
    const v1 = parseFloat(inputs[1].value);
    const v2 = parseFloat(inputs[2].value);
    if (lbl) {
      labels.push(lbl);
      s1data.push(isNaN(v1) ? 0 : v1);
      s2data.push(isNaN(v2) ? null : v2);
    }
  });
  if (labels.length === 0) { alert('請至少輸入一個評估項目'); return; }

  const s1Name = gv('t5_s1_name') || '系列1';
  const s2Name = gv('t5_s2_name');
  const minVal = parseFloat(gv('t5_min')) || 0;
  const maxVal = parseFloat(gv('t5_max')) || 10;
  const chartTitle = gv('t5_title') || '雷達圖';
  const colS1 = gv('t5_col_s1'), colS2 = gv('t5_col_s2');
  const textColor = gv('t5_text_color');
  const fsTitle = gi('t5_fs_title'), fsLabel = gi('t5_fs_label'), fsTick = gi('t5_fs_tick');

  destroyChart('chart5'); showChart('chart5');

  const titleEl = document.getElementById('chart5_title');
  titleEl.textContent = chartTitle;
  titleEl.style.fontSize = fsTitle + 'px';
  titleEl.style.color = textColor;

  const datasets = [{
    label: s1Name, data: s1data,
    backgroundColor: hexToRgba(colS1, 0.2), borderColor: colS1,
    pointBackgroundColor: colS1, pointRadius: 5, borderWidth: 2,
  }];

  if (s2data.some(v => v !== null) && s2Name) {
    datasets.push({
      label: s2Name, data: s2data.map(v => v===null ? 0 : v),
      backgroundColor: hexToRgba(colS2, 0.18), borderColor: colS2,
      pointBackgroundColor: colS2, pointRadius: 5, borderWidth: 2,
    });
  }

  const chart = new Chart(document.getElementById('chart5').getContext('2d'), {
    type: 'radar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: true, labels: { color: textColor, font: { size: 13 }, padding: 16 } }
      },
      scales: {
        r: {
          min: minVal, max: maxVal,
          ticks: { stepSize: (maxVal-minVal)/5, font: { size: fsTick }, color: textColor, backdropColor: 'transparent' },
          pointLabels: { font: { size: fsLabel, weight: '600' }, color: textColor },
          grid: { color: GRID_MAIN },
          angleLines: { color: 'rgb(220,220,220)' },
        }
      }
    }
  });
  chartInstances['chart5'] = chart;
}

// ===== DOWNLOAD AS JPG =====
function downloadChart(id) {
  if (!chartInstances[id]) { alert('請先生成圖表'); return; }
  const canvas = document.getElementById(id);
  const titleEl = document.getElementById(id + '_title');
  const titleText = titleEl.textContent;
  const titleSize = parseInt(titleEl.style.fontSize) || 18;
  const titleColor = titleEl.style.color || '#000000';

  const scale = 2;
  const off = document.createElement('canvas');
  off.width  = canvas.width * scale;
  off.height = (canvas.height + 64) * scale;
  const ctx = off.getContext('2d');
  ctx.scale(scale, scale);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, off.width, off.height);
  ctx.fillStyle = titleColor;
  ctx.font = `700 ${titleSize}px 'Noto Sans TC', sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(titleText, canvas.width/2, 36);
  ctx.drawImage(canvas, 0, 52, canvas.width, canvas.height);

  const link = document.createElement('a');
  link.download = `${titleText || id}.jpg`;
  link.href = off.toDataURL('image/jpeg', 0.95);
  link.click();
}
